<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosso Cantinho ❤️</title>

<link rel="stylesheet" href="css/style.css">

<style>

.login-box{
max-width:500px;
margin:120px auto;
text-align:center;
padding:40px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);
border-radius:30px;
}

.login-box input{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:15px;
font-size:18px;
}

.login-box button{
margin-top:20px;
padding:15px 30px;
border:none;
border-radius:15px;
cursor:pointer;
font-size:18px;
}

#erro{
margin-top:15px;
}

</style>

</head>

<body>

<div class="stars"></div>

<div class="login-box">

<h1>❤️ Nosso Cantinho ❤️</h1>

<p>Digite a data especial</p>

<input
type="password"
id="senha"
placeholder="DDMMAA">

<button onclick="entrar()">
Entrar
</button>

<p id="erro"></p>

</div>

<script src="js/login.js"></script>

</body>
</html>
